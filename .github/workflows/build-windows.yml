name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install flet
          pip install -r requirements.txt

      - name: Build exe
        run: |
          flet pack main.py --name RainDrop

      - name: Package
        run: |
          Compress-Archive -Path "dist\*" -DestinationPath "RainDrop-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RainDrop-Windows
          path: RainDrop-Windows.zip

      - name: Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: RainDrop-Windows.zip
          generate_release_notes: true
